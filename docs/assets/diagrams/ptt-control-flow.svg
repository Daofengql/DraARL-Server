<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 300" font-family="Microsoft YaHei, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="550" height="40" fill="#ff9800" rx="8"/>
  <text x="275" y="27" text-anchor="middle" fill="white" font-size="16" font-weight="bold">PTT 控制流程</text>

  <!-- 设备 -->
  <rect x="30" y="60" width="100" height="40" fill="white" rx="8" filter="url(#shadow)" stroke="#1976d2" stroke-width="2"/>
  <text x="80" y="85" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">设备</text>

  <!-- 服务器 -->
  <rect x="420" y="60" width="100" height="40" fill="white" rx="8" filter="url(#shadow)" stroke="#4caf50" stroke-width="2"/>
  <text x="470" y="85" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">服务器</text>

  <!-- PTT Start -->
  <rect x="150" y="110" width="250" height="30" fill="#e3f2fd" rx="4"/>
  <text x="275" y="130" text-anchor="middle" fill="#1565c0" font-size="11">PTT Start (Type=0, CmdID=0x01)</text>
  <path d="M 130 125 L 150 125" stroke="#1976d2" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 400 125 L 420 125" stroke="#1976d2" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 服务器处理 -->
  <rect x="420" y="150" width="100" height="25" fill="#fff3e0" rx="4"/>
  <text x="470" y="167" text-anchor="middle" fill="#e65100" font-size="9">半双工仲裁</text>

  <!-- 响应 -->
  <rect x="150" y="185" width="250" height="25" fill="#e8f5e9" rx="4"/>
  <text x="275" y="202" text-anchor="middle" fill="#2e7d32" font-size="10">Response: Status=0 (成功)</text>
  <path d="M 420 197 L 400 197" stroke="#4caf50" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 150 197 L 130 197" stroke="#4caf50" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 语音传输 -->
  <rect x="150" y="220" width="250" height="25" fill="#f3e5f5" rx="4"/>
  <text x="275" y="237" text-anchor="middle" fill="#7b1fa2" font-size="10">[语音数据传输...]</text>
  <path d="M 130 232 L 150 232" stroke="#9c27b0" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 400 232 L 420 232" stroke="#9c27b0" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- PTT Stop -->
  <rect x="150" y="255" width="250" height="30" fill="#ffebee" rx="4"/>
  <text x="275" y="275" text-anchor="middle" fill="#c53030" font-size="11">PTT Stop (Type=0, CmdID=0x02)</text>
  <path d="M 130 270 L 150 270" stroke="#e53e3e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 400 270 L 420 270" stroke="#e53e3e" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 释放 -->
  <rect x="420" y="285" width="100" height="20" fill="#e8f5e9" rx="4"/>
  <text x="470" y="299" text-anchor="middle" fill="#2e7d32" font-size="9">释放发言权</text>
</svg>
