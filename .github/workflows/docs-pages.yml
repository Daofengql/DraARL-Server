name: Docs Deploy (EdgeOne Pages)

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: edgeone-pages
  cancel-in-progress: false

jobs:
  build-docs:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: docs/requirements.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/requirements.txt

      - name: Build MkDocs
        run: mkdocs build -f docs/mkdocs.yml --strict

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site

  deploy-edgeone:
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: mkdocs-site
          path: site

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.11.0'

      - name: Validate EdgeOne config
        run: |
          [ -n "${{ secrets.EDGEONE_API_TOKEN }}" ] || (echo "Missing secret: EDGEONE_API_TOKEN" && exit 1)
          [ -n "${{ vars.EDGEONE_PAGES_PROJECT }}" ] || (echo "Missing variable: EDGEONE_PAGES_PROJECT" && exit 1)

      - name: Deploy to EdgeOne Pages
        run: npx edgeone pages deploy site -n "${{ vars.EDGEONE_PAGES_PROJECT }}" -t "$EDGEONE_API_TOKEN" -e production
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
