<svg width="100%" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stepGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Step 1 -->
  <g transform="translate(40, 20)">
    <circle cx="30" cy="30" r="28" fill="url(#stepGradient)" filter="url(#shadow)"/>
    <text x="30" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="bold">1</text>
    <text x="30" y="80" text-anchor="middle" fill="#333" font-size="13" font-weight="600">注册账号</text>
    <text x="30" y="96" text-anchor="middle" fill="#666" font-size="11">提交注册申请</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 105 50 L 145 50" stroke="#667eea" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#667eea"/>
    </marker>
  </defs>

  <!-- Step 2 -->
  <g transform="translate(160, 20)">
    <circle cx="30" cy="30" r="28" fill="url(#stepGradient)" filter="url(#shadow)"/>
    <text x="30" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="bold">2</text>
    <text x="30" y="80" text-anchor="middle" fill="#333" font-size="13" font-weight="600">审核通过</text>
    <text x="30" y="96" text-anchor="middle" fill="#666" font-size="11">管理员审核</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 225 50 L 265 50" stroke="#667eea" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <!-- Step 3 -->
  <g transform="translate(280, 20)">
    <circle cx="30" cy="30" r="28" fill="url(#stepGradient)" filter="url(#shadow)"/>
    <text x="30" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="bold">3</text>
    <text x="30" y="80" text-anchor="middle" fill="#333" font-size="13" font-weight="600">获取密码</text>
    <text x="30" y="96" text-anchor="middle" fill="#666" font-size="11">个人中心查看</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 345 50 L 385 50" stroke="#667eea" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <g transform="translate(400, 20)">
    <circle cx="30" cy="30" r="28" fill="url(#stepGradient)" filter="url(#shadow)"/>
    <text x="30" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="bold">4</text>
    <text x="30" y="80" text-anchor="middle" fill="#333" font-size="13" font-weight="600">配置设备</text>
    <text x="30" y="96" text-anchor="middle" fill="#666" font-size="11">填入认证信息</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M 465 50 L 505 50" stroke="#667eea" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowhead)"/>

  <!-- Step 5 -->
  <g transform="translate(520, 20)">
    <circle cx="30" cy="30" r="28" fill="url(#stepGradient)" filter="url(#shadow)"/>
    <text x="30" y="36" text-anchor="middle" fill="white" font-size="18" font-weight="bold">5</text>
    <text x="30" y="80" text-anchor="middle" fill="#333" font-size="13" font-weight="600">开始通信</text>
    <text x="30" y="96" text-anchor="middle" fill="#666" font-size="11">设备上线</text>
  </g>

  <!-- Success Icon -->
  <g transform="translate(580, 35)">
    <circle cx="15" cy="15" r="14" fill="#4caf50" opacity="0.2"/>
    <path d="M 8 15 L 13 20 L 22 10" stroke="#4caf50" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
