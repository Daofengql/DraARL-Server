<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" font-family="Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6a1b9a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e24aa;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="900" height="50" fill="url(#grad)" rx="8"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">群组互联架构 - 虚拟互联组</text>

  <!-- 普通群组A -->
  <rect x="50" y="80" width="200" height="200" fill="white" rx="10" filter="url(#shadow)" stroke="#2196f3" stroke-width="2"/>
  <rect x="50" y="80" width="200" height="40" fill="#2196f3" rx="10"/>
  <rect x="50" y="105" width="200" height="15" fill="#2196f3"/>
  <text x="150" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="bold">群组 A</text>
  
  <text x="150" y="145" text-anchor="middle" fill="#333" font-size="12">公开群组</text>
  <text x="150" y="165" text-anchor="middle" fill="#666" font-size="10">439.500 MHz</text>
  
  <rect x="70" y="180" width="160" height="25" fill="#e3f2fd" rx="4"/>
  <text x="150" y="197" text-anchor="middle" fill="#333" font-size="10">设备1 (ESP32)</text>
  
  <rect x="70" y="215" width="160" height="25" fill="#e3f2fd" rx="4"/>
  <text x="150" y="232" text-anchor="middle" fill="#333" font-size="10">设备2 (Android)</text>
  
  <rect x="70" y="250" width="160" height="25" fill="#e3f2fd" rx="4"/>
  <text x="150" y="267" text-anchor="middle" fill="#333" font-size="10">设备3 (Web)</text>

  <!-- 虚拟互联组 -->
  <rect x="330" y="80" width="240" height="200" fill="white" rx="10" filter="url(#shadow)" stroke="#ff9800" stroke-width="3"/>
  <rect x="330" y="80" width="240" height="40" fill="#ff9800" rx="10"/>
  <rect x="330" y="105" width="240" height="15" fill="#ff9800"/>
  <text x="450" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="bold">虚拟互联组</text>
  
  <text x="450" y="145" text-anchor="middle" fill="#333" font-size="12">is_virtual = 1</text>
  <text x="450" y="165" text-anchor="middle" fill="#666" font-size="10">自动转发到关联群组</text>
  
  <rect x="350" y="180" width="200" height="30" fill="#fff3e0" rx="4" stroke="#ff9800" stroke-width="1"/>
  <text x="450" y="200" text-anchor="middle" fill="#e65100" font-size="11">关联群组 A</text>
  
  <rect x="350" y="220" width="200" height="30" fill="#fff3e0" rx="4" stroke="#ff9800" stroke-width="1"/>
  <text x="450" y="240" text-anchor="middle" fill="#e65100" font-size="11">关联群组 B</text>
  
  <rect x="350" y="260" width="200" height="15" fill="white" rx="4"/>
  <text x="450" y="273" text-anchor="middle" fill="#999" font-size="9">group_links 表</text>

  <!-- 普通群组B -->
  <rect x="650" y="80" width="200" height="200" fill="white" rx="10" filter="url(#shadow)" stroke="#4caf50" stroke-width="2"/>
  <rect x="650" y="80" width="200" height="40" fill="#4caf50" rx="10"/>
  <rect x="650" y="105" width="200" height="15" fill="#4caf50"/>
  <text x="750" y="108" text-anchor="middle" fill="white" font-size="14" font-weight="bold">群组 B</text>
  
  <text x="750" y="145" text-anchor="middle" fill="#333" font-size="12">私有群组</text>
  <text x="750" y="165" text-anchor="middle" fill="#666" font-size="10">431.500 MHz</text>
  
  <rect x="670" y="180" width="160" height="25" fill="#e8f5e9" rx="4"/>
  <text x="750" y="197" text-anchor="middle" fill="#333" font-size="10">设备4 (ESP32)</text>
  
  <rect x="670" y="215" width="160" height="25" fill="#e8f5e9" rx="4"/>
  <text x="750" y="232" text-anchor="middle" fill="#333" font-size="10">设备5 (iOS)</text>
  
  <rect x="670" y="250" width="160" height="25" fill="#e8f5e9" rx="4"/>
  <text x="750" y="267" text-anchor="middle" fill="#333" font-size="10">设备6 (桥接器)</text>

  <!-- 连接线 -->
  <path d="M 250 180 L 330 180" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,5"/>
  <path d="M 570 180 L 650 180" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="5,5"/>

  <!-- 转发流程 -->
  <rect x="50" y="310" width="800" height="120" fill="white" rx="10" filter="url(#shadow)" stroke="#e0e0e0"/>
  <text x="450" y="340" text-anchor="middle" fill="#333" font-size="14" font-weight="bold">跨群组转发流程</text>
  
  <rect x="80" y="355" width="140" height="55" fill="#e3f2fd" rx="6"/>
  <text x="150" y="380" text-anchor="middle" fill="#333" font-size="11">设备1 发送语音</text>
  <text x="150" y="398" text-anchor="middle" fill="#666" font-size="9">群组 A</text>
  
  <path d="M 220 382 L 280 382" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="280" y="355" width="140" height="55" fill="#fff3e0" rx="6"/>
  <text x="350" y="380" text-anchor="middle" fill="#333" font-size="11">虚拟互联组</text>
  <text x="350" y="398" text-anchor="middle" fill="#666" font-size="9">检测关联群组</text>
  
  <path d="M 420 382 L 480 382" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="480" y="355" width="140" height="55" fill="#e8f5e9" rx="6"/>
  <text x="550" y="380" text-anchor="middle" fill="#333" font-size="11">群组 B</text>
  <text x="550" y="398" text-anchor="middle" fill="#666" font-size="9">转发到所有设备</text>
  
  <path d="M 620 382 L 680 382" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  
  <rect x="680" y="355" width="140" height="55" fill="#e8f5e9" rx="6"/>
  <text x="750" y="380" text-anchor="middle" fill="#333" font-size="11">设备4/5/6</text>
  <text x="750" y="398" text-anchor="middle" fill="#666" font-size="9">接收语音</text>
</svg>
