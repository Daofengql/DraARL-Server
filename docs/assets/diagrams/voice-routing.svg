<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e7d32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43a047;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="1000" height="50" fill="url(#grad)" rx="8"/>
  <text x="500" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">语音转发与半双工仲裁架构</text>

  <!-- 发送端 -->
  <rect x="50" y="80" width="150" height="120" fill="white" rx="10" filter="url(#shadow)" stroke="#1976d2" stroke-width="2"/>
  <rect x="50" y="80" width="150" height="35" fill="#1976d2" rx="10"/>
  <rect x="50" y="100" width="150" height="15" fill="#1976d2"/>
  <text x="125" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold">设备 A</text>
  <text x="125" y="135" text-anchor="middle" fill="#333" font-size="12">user1</text>
  <text x="125" y="155" text-anchor="middle" fill="#666" font-size="11">BG1AAA</text>
  <text x="125" y="175" text-anchor="middle" fill="#666" font-size="10">SSID: 1</text>
  <text x="125" y="190" text-anchor="middle" fill="#1976d2" font-size="10">发射中...</text>

  <!-- 箭头1 -->
  <path d="M 200 140 L 280 140" stroke="#1976d2" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="240" y="130" text-anchor="middle" fill="#1976d2" font-size="10">Opus 16K</text>
  <text x="240" y="155" text-anchor="middle" fill="#666" font-size="9">60ms帧</text>

  <!-- 服务器 -->
  <rect x="280" y="70" width="440" height="380" fill="#f5f5f5" rx="12" filter="url(#shadow)" stroke="#4caf50" stroke-width="2"/>
  <rect x="280" y="70" width="440" height="40" fill="#4caf50" rx="12"/>
  <rect x="280" y="95" width="440" height="15" fill="#4caf50"/>
  <text x="500" y="97" text-anchor="middle" fill="white" font-size="16" font-weight="bold">DraARL 服务器</text>

  <!-- 半双工仲裁 -->
  <rect x="310" y="125" width="380" height="100" fill="white" rx="8" stroke="#ff9800" stroke-width="2"/>
  <text x="500" y="150" text-anchor="middle" fill="#e65100" font-size="14" font-weight="bold">半双工仲裁器</text>
  <text x="500" y="170" text-anchor="middle" fill="#666" font-size="11">同一转发域同时只允许一个说话人</text>
  
  <rect x="330" y="185" width="100" height="25" fill="#fff3e0" rx="4"/>
  <text x="380" y="202" text-anchor="middle" fill="#333" font-size="10">获取发言权</text>
  
  <rect x="450" y="185" width="100" height="25" fill="#fff3e0" rx="4"/>
  <text x="500" y="202" text-anchor="middle" fill="#333" font-size="10">900ms超时</text>
  
  <rect x="570" y="185" width="100" height="25" fill="#fff3e0" rx="4"/>
  <text x="620" y="202" text-anchor="middle" fill="#333" font-size="10">释放发言权</text>

  <!-- 群组路由 -->
  <rect x="310" y="240" width="180" height="80" fill="white" rx="8" stroke="#2196f3" stroke-width="2"/>
  <text x="400" y="265" text-anchor="middle" fill="#1565c0" font-size="13" font-weight="bold">群组路由</text>
  <text x="400" y="285" text-anchor="middle" fill="#666" font-size="10">RCU模式缓存</text>
  <text x="400" y="300" text-anchor="middle" fill="#666" font-size="10">O(1)索引查询</text>

  <!-- 互联组 -->
  <rect x="510" y="240" width="180" height="80" fill="white" rx="8" stroke="#9c27b0" stroke-width="2"/>
  <text x="600" y="265" text-anchor="middle" fill="#7b1fa2" font-size="13" font-weight="bold">虚拟互联组</text>
  <text x="600" y="285" text-anchor="middle" fill="#666" font-size="10">跨群组转发</text>
  <text x="600" y="300" text-anchor="middle" fill="#666" font-size="10">防循环机制</text>

  <!-- 通信录制 -->
  <rect x="310" y="335" width="380" height="50" fill="white" rx="8" stroke="#4caf50" stroke-width="2"/>
  <text x="500" y="360" text-anchor="middle" fill="#2e7d32" font-size="13" font-weight="bold">通信录制</text>
  <text x="500" y="378" text-anchor="middle" fill="#666" font-size="10">缓冲 → MinIO上传 → 数据库同步</text>

  <!-- 接收端 -->
  <rect x="770" y="80" width="150" height="120" fill="white" rx="10" filter="url(#shadow)" stroke="#4caf50" stroke-width="2"/>
  <rect x="770" y="80" width="150" height="35" fill="#4caf50" rx="10"/>
  <rect x="770" y="100" width="150" height="15" fill="#4caf50"/>
  <text x="845" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold">设备 B</text>
  <text x="845" y="135" text-anchor="middle" fill="#333" font-size="12">user2</text>
  <text x="845" y="155" text-anchor="middle" fill="#666" font-size="11">BG2BBB</text>
  <text x="845" y="175" text-anchor="middle" fill="#666" font-size="10">SSID: 1</text>
  <text x="845" y="190" text-anchor="middle" fill="#4caf50" font-size="10">接收中...</text>

  <!-- 箭头2 -->
  <path d="M 720 140 L 770 140" stroke="#4caf50" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="745" y="130" text-anchor="middle" fill="#4caf50" font-size="10">转发</text>

  <!-- 其他接收端 -->
  <rect x="770" y="220" width="150" height="80" fill="white" rx="10" filter="url(#shadow)" stroke="#4caf50" stroke-width="1.5"/>
  <text x="845" y="250" text-anchor="middle" fill="#333" font-size="12">设备 C</text>
  <text x="845" y="270" text-anchor="middle" fill="#666" font-size="10">user3 (BG3CCC)</text>
  <text x="845" y="288" text-anchor="middle" fill="#4caf50" font-size="9">接收中...</text>

  <rect x="770" y="320" width="150" height="80" fill="white" rx="10" filter="url(#shadow)" stroke="#4caf50" stroke-width="1.5"/>
  <text x="845" y="350" text-anchor="middle" fill="#333" font-size="12">Web 浏览器</text>
  <text x="845" y="370" text-anchor="middle" fill="#666" font-size="10">user4 (幽灵设备)</text>
  <text x="845" y="388" text-anchor="middle" fill="#4caf50" font-size="9">WebSocket</text>

  <!-- 箭头到其他接收端 -->
  <path d="M 720 260 L 770 260" stroke="#4caf50" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 720 360 L 770 360" stroke="#4caf50" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- 流程说明 -->
  <rect x="50" y="420" width="900" height="60" fill="white" rx="8" filter="url(#shadow)" stroke="#e0e0e0"/>
  <text x="500" y="445" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">语音转发流程</text>
  <text x="500" y="465" text-anchor="middle" fill="#666" font-size="11">设备A发送Opus语音 → 服务器认证检查 → 半双工仲裁获取发言权 → 群组路由查找成员 → 转发到设备B/C/Web</text>
</svg>
