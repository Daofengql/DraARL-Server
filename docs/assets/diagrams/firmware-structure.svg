<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" font-family="Microsoft YaHei, sans-serif">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="500" height="45" fill="#4caf50" rx="8"/>
  <text x="250" y="30" text-anchor="middle" fill="white" font-size="18" font-weight="bold">固件文件结构</text>

  <!-- 整体框 -->
  <rect x="30" y="60" width="440" height="320" fill="white" rx="10" filter="url(#shadow)" stroke="#e0e0e0" stroke-width="2"/>

  <!-- 文件头 -->
  <rect x="50" y="80" width="400" height="100" fill="#e3f2fd" rx="6" stroke="#1976d2" stroke-width="1.5"/>
  <text x="250" y="105" text-anchor="middle" fill="#1565c0" font-size="14" font-weight="bold">文件头 (可选)</text>
  
  <rect x="70" y="115" width="160" height="25" fill="white" rx="4"/>
  <text x="150" y="132" text-anchor="middle" fill="#333" font-size="10">魔数: 0xESP32OTA</text>
  
  <rect x="250" y="115" width="160" height="25" fill="white" rx="4"/>
  <text x="330" y="132" text-anchor="middle" fill="#333" font-size="10">版本: 固件版本号</text>
  
  <rect x="70" y="150" width="160" height="25" fill="white" rx="4"/>
  <text x="150" y="167" text-anchor="middle" fill="#333" font-size="10">大小: 固件数据大小</text>
  
  <rect x="250" y="150" width="160" height="25" fill="white" rx="4"/>
  <text x="330" y="167" text-anchor="middle" fill="#333" font-size="10">校验: CRC32/SHA-256</text>

  <!-- 固件数据 -->
  <rect x="50" y="200" width="400" height="80" fill="#fff3e0" rx="6" stroke="#ff9800" stroke-width="1.5"/>
  <text x="250" y="225" text-anchor="middle" fill="#e65100" font-size="14" font-weight="bold">固件数据</text>
  
  <rect x="70" y="240" width="110" height="25" fill="white" rx="4"/>
  <text x="125" y="257" text-anchor="middle" fill="#333" font-size="10">应用程序代码</text>
  
  <rect x="195" y="240" width="110" height="25" fill="white" rx="4"/>
  <text x="250" y="257" text-anchor="middle" fill="#333" font-size="10">资源文件</text>
  
  <rect x="320" y="240" width="110" height="25" fill="white" rx="4"/>
  <text x="375" y="257" text-anchor="middle" fill="#333" font-size="10">配置数据</text>

  <!-- 签名 (可选) -->
  <rect x="50" y="300" width="400" height="50" fill="#f3e5f5" rx="6" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="250" y="330" text-anchor="middle" fill="#7b1fa2" font-size="14" font-weight="bold">数字签名 (可选)</text>

  <!-- 大小标注 -->
  <rect x="460" y="80" width="20" height="240" fill="none" stroke="#9e9e9e" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="470" y="200" text-anchor="middle" fill="#999" font-size="9" transform="rotate(90,470,200)">最大 4MB</text>
</svg>
