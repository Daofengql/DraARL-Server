<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="700" viewBox="0 0 1260 700" role="img" aria-labelledby="title desc">
  <title id="title">DraARL 设备动态码绑定流程图</title>
  <desc id="desc">展示设备端、Web 端和服务端在动态码绑定中的交互。</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; }
      .head { fill: #e0f2fe; stroke: #7dd3fc; stroke-width: 1; rx: 10; }
      .step { fill: #fff; stroke: #94a3b8; stroke-width: 1.3; rx: 10; }
      .server { fill: #f0fdf4; stroke: #86efac; stroke-width: 1.3; rx: 10; }
      .web { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1.3; rx: 10; }
      .device { fill: #fff7ed; stroke: #fdba74; stroke-width: 1.3; rx: 10; }
      .title { font: 700 26px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 16px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #1e293b; }
      .small { font: 13px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #475569; }
      .tiny { font: 12px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .arrow-blue { stroke: #2563eb; stroke-width: 2; fill: none; marker-end: url(#arrowBlue); }
      .arrow-orange { stroke: #ea580c; stroke-width: 2; fill: none; marker-end: url(#arrowOrange); }
      .dash { stroke-dasharray: 6 5; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect class="bg" width="1260" height="700"/>
  <text class="title" x="44" y="54">设备动态码绑定流程</text>

  <rect class="lane" x="50" y="92" width="330" height="540"/>
  <rect class="head" x="78" y="118" width="274" height="46"/>
  <text class="label" x="152" y="148">设备端</text>

  <rect class="lane" x="465" y="92" width="330" height="540"/>
  <rect class="head" x="493" y="118" width="274" height="46"/>
  <text class="label" x="572" y="148">服务端</text>

  <rect class="lane" x="880" y="92" width="330" height="540"/>
  <rect class="head" x="908" y="118" width="274" height="46"/>
  <text class="label" x="990" y="148">Web 用户</text>

  <rect class="device" x="86" y="198" width="245" height="76"/>
  <text class="label" x="112" y="228">1. 预检查</text>
  <text class="small" x="112" y="252">提交 MAC、用户名、设备密码</text>

  <rect class="server" x="505" y="198" width="245" height="76"/>
  <text class="label" x="531" y="228">2. 判断状态</text>
  <text class="small" x="531" y="252">已认证或需要绑定</text>

  <rect class="device" x="86" y="322" width="245" height="76"/>
  <text class="label" x="112" y="352">3. 请求动态码</text>
  <text class="small" x="112" y="376">显示 6 位动态码</text>

  <rect class="server" x="505" y="322" width="245" height="76"/>
  <text class="label" x="531" y="352">4. 暂存绑定会话</text>
  <text class="small" x="531" y="376">MAC、动态码、过期时间</text>

  <rect class="web" x="920" y="322" width="245" height="76"/>
  <text class="label" x="946" y="352">5. 输入动态码</text>
  <text class="small" x="946" y="376">登录且审核通过用户操作</text>

  <rect class="web" x="920" y="446" width="245" height="76"/>
  <text class="label" x="946" y="476">6. 选择 SSID</text>
  <text class="small" x="946" y="500">推荐或替换已有设备</text>

  <rect class="server" x="505" y="446" width="245" height="76"/>
  <text class="label" x="531" y="476">7. 保存绑定配置</text>
  <text class="small" x="531" y="500">owner_id + ssid 唯一</text>

  <rect class="device" x="86" y="522" width="245" height="76"/>
  <text class="label" x="112" y="552">8. 轮询确认</text>
  <text class="small" x="112" y="576">获取用户名、设备密码、SSID</text>

  <path class="arrow-orange" d="M331 236 L505 236"/>
  <text class="tiny" x="364" y="222">POST /api/device/pre-check</text>
  <path class="arrow-orange" d="M505 258 L331 258"/>
  <text class="tiny" x="370" y="279">need_bind 或 authenticated</text>

  <path class="arrow-orange" d="M331 360 L505 360"/>
  <text class="tiny" x="358" y="346">POST /api/device/request-code</text>
  <path class="arrow-orange" d="M505 382 L331 382"/>
  <text class="tiny" x="392" y="403">dynamic_code</text>

  <path class="arrow-blue" d="M920 360 L750 360"/>
  <text class="tiny" x="782" y="346">POST /api/device/bind</text>
  <path class="arrow-blue" d="M750 382 L920 382"/>
  <text class="tiny" x="772" y="403">可用 SSID / 推荐 SSID</text>

  <path class="arrow-blue" d="M920 484 L750 484"/>
  <text class="tiny" x="758" y="470">POST /api/device/submit-config</text>
  <path class="arrow-orange dash" d="M505 560 L331 560"/>
  <text class="tiny" x="352" y="545">confirm-bind 返回 ready</text>
  <path class="arrow-orange dash" d="M331 538 L505 538"/>
  <text class="tiny" x="353" y="524">POST /api/device/confirm-bind</text>

  <rect x="68" y="648" width="1124" height="32" rx="10" fill="#e2e8f0"/>
  <text class="small" x="92" y="670">普通设备 SSID 可用范围为 1-99、106-254；100-105 为幽灵设备保留，255 为系统/历史特殊保留。</text>
</svg>
