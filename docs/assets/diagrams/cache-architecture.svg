<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" font-family="Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e65100;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f57c00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="1000" height="50" fill="url(#grad)" rx="8"/>
  <text x="500" y="32" text-anchor="middle" fill="white" font-size="20" font-weight="bold">多级缓存架构</text>

  <!-- L1 内存缓存 -->
  <rect x="50" y="70" width="900" height="180" fill="white" rx="12" filter="url(#shadow)" stroke="#ff9800" stroke-width="3"/>
  <rect x="50" y="70" width="900" height="40" fill="#ff9800" rx="12"/>
  <rect x="50" y="95" width="900" height="15" fill="#ff9800"/>
  <text x="500" y="97" text-anchor="middle" fill="white" font-size="16" font-weight="bold">L1: 内存缓存层</text>
  
  <rect x="80" y="125" width="180" height="60" fill="#fff3e0" rx="6" stroke="#ffb74d" stroke-width="1"/>
  <text x="170" y="150" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">用户缓存</text>
  <text x="170" y="170" text-anchor="middle" fill="#666" font-size="10">32分片 | TTL过期</text>
  
  <rect x="280" y="125" width="180" height="60" fill="#fff3e0" rx="6" stroke="#ffb74d" stroke-width="1"/>
  <text x="370" y="150" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">设备缓存</text>
  <text x="370" y="170" text-anchor="middle" fill="#666" font-size="10">32分片 | 在线状态</text>
  
  <rect x="480" y="125" width="180" height="60" fill="#fff3e0" rx="6" stroke="#ffb74d" stroke-width="1"/>
  <text x="570" y="150" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">群组缓存</text>
  <text x="570" y="170" text-anchor="middle" fill="#666" font-size="10">RCU模式 | 无锁读</text>
  
  <rect x="680" y="125" width="120" height="60" fill="#fff3e0" rx="6" stroke="#ffb74d" stroke-width="1"/>
  <text x="740" y="150" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">配置缓存</text>
  <text x="740" y="170" text-anchor="middle" fill="#666" font-size="10">8分片</text>
  
  <rect x="820" y="125" width="110" height="60" fill="#fff3e0" rx="6" stroke="#ffb74d" stroke-width="1"/>
  <text x="875" y="150" text-anchor="middle" fill="#333" font-size="13" font-weight="bold">命中率</text>
  <text x="875" y="170" text-anchor="middle" fill="#666" font-size="10">实时监控</text>

  <text x="500" y="215" text-anchor="middle" fill="#e65100" font-size="11">特点: 分片锁减少竞争 | RCU模式读无锁写时复制 | 自动过期清理</text>

  <!-- 箭头 -->
  <path d="M 500 250 L 500 275" stroke="#ff9800" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <defs>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800"/>
    </marker>
  </defs>

  <!-- L2 Redis -->
  <rect x="50" y="275" width="430" height="130" fill="white" rx="12" filter="url(#shadow)" stroke="#f44336" stroke-width="2"/>
  <rect x="50" y="275" width="430" height="35" fill="#f44336" rx="12"/>
  <rect x="50" y="295" width="430" height="15" fill="#f44336"/>
  <text x="265" y="298" text-anchor="middle" fill="white" font-size="14" font-weight="bold">L2: Redis 缓存 (可选)</text>
  
  <rect x="70" y="320" width="180" height="40" fill="#ffebee" rx="4"/>
  <text x="160" y="345" text-anchor="middle" fill="#333" font-size="11">Refresh Token 存储</text>
  
  <rect x="270" y="320" width="180" height="40" fill="#ffebee" rx="4"/>
  <text x="360" y="345" text-anchor="middle" fill="#333" font-size="11">会话数据</text>
  
  <text x="265" y="385" text-anchor="middle" fill="#666" font-size="10">降级策略: Redis不可用时自动降级到内存存储</text>

  <!-- L2 MySQL -->
  <rect x="520" y="275" width="430" height="130" fill="white" rx="12" filter="url(#shadow)" stroke="#2196f3" stroke-width="2"/>
  <rect x="520" y="275" width="430" height="35" fill="#2196f3" rx="12"/>
  <rect x="520" y="295" width="430" height="15" fill="#2196f3"/>
  <text x="735" y="298" text-anchor="middle" fill="white" font-size="14" font-weight="bold">L3: MySQL 持久化</text>
  
  <rect x="540" y="320" width="120" height="40" fill="#e3f2fd" rx="4"/>
  <text x="600" y="345" text-anchor="middle" fill="#333" font-size="11">用户数据</text>
  
  <rect x="680" y="320" width="120" height="40" fill="#e3f2fd" rx="4"/>
  <text x="740" y="345" text-anchor="middle" fill="#333" font-size="11">设备数据</text>
  
  <rect x="820" y="320" width="110" height="40" fill="#e3f2fd" rx="4"/>
  <text x="875" y="345" text-anchor="middle" fill="#333" font-size="11">通信记录</text>
  
  <text x="735" y="385" text-anchor="middle" fill="#666" font-size="10">连接池: MaxOpen=25 | MaxIdle=5 | MaxLifetime=300s</text>

  <!-- 箭头 -->
  <path d="M 265 405 L 265 430" stroke="#f44336" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M 735 405 L 735 430" stroke="#2196f3" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f44336"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2196f3"/>
    </marker>
  </defs>

  <!-- L3 MinIO -->
  <rect x="50" y="430" width="900" height="100" fill="white" rx="12" filter="url(#shadow)" stroke="#4caf50" stroke-width="2"/>
  <rect x="50" y="430" width="900" height="35" fill="#4caf50" rx="12"/>
  <rect x="50" y="450" width="900" height="15" fill="#4caf50"/>
  <text x="500" y="453" text-anchor="middle" fill="white" font-size="14" font-weight="bold">L4: MinIO 对象存储 (可选)</text>
  
  <rect x="80" y="475" width="130" height="35" fill="#e8f5e9" rx="4"/>
  <text x="145" y="497" text-anchor="middle" fill="#333" font-size="10">用户头像</text>
  
  <rect x="230" y="475" width="130" height="35" fill="#e8f5e9" rx="4"/>
  <text x="295" y="497" text-anchor="middle" fill="#333" font-size="10">操作证文件</text>
  
  <rect x="380" y="475" width="130" height="35" fill="#e8f5e9" rx="4"/>
  <text x="445" y="497" text-anchor="middle" fill="#333" font-size="10">通信音频</text>
  
  <rect x="530" y="475" width="130" height="35" fill="#e8f5e9" rx="4"/>
  <text x="595" y="497" text-anchor="middle" fill="#333" font-size="10">固件文件</text>
  
  <rect x="680" y="475" width="130" height="35" fill="#e8f5e9" rx="4"/>
  <text x="745" y="497" text-anchor="middle" fill="#333" font-size="10">资源文件</text>
  
  <rect x="830" y="475" width="100" height="35" fill="#e8f5e9" rx="4"/>
  <text x="880" y="497" text-anchor="middle" fill="#333" font-size="10">前端CDN</text>

  <!-- 读写流程 -->
  <rect x="50" y="550" width="900" height="40" fill="white" rx="6" filter="url(#shadow)" stroke="#e0e0e0"/>
  <text x="500" y="575" text-anchor="middle" fill="#333" font-size="12">读流程: L1内存 → L2 Redis → L3 MySQL | 写流程: L3 MySQL → 清除L1/L2缓存</text>
</svg>
